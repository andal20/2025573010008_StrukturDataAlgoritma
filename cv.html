<!DOCTYPE html>
<html>
<head>
    <title>CV Biodata 2</title>
</head>
<body>

    <h1 align="center">CURRICULUM VITAE</h1>

    <!-- BAGIAN BIODATA (TABEL) -->
    <h2>Biodata Diri</h2>
    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <td>Nama</td>
            <td>Andal</td>
        </tr>
        <tr>
            <td>Tempat, Tanggal Lahir</td>
            <td>Medan, 01 Januari 2000</td>
        </tr>
        <tr>
            <td>Jenis Kelamin</td>
            <td>Laki-laki</td>
        </tr>
        <tr>
            <td>Alamat</td>
            <td>Patisah Hulu</td>
        </tr>
        <tr>
            <td>Email</td>
            <td>email@gmail.com</td>
        </tr>
    </table>

    <br>

    <!-- BAGIAN PENDIDIKAN -->
    <h2>Riwayat Pendidikan</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>Tahun</th>
            <th>Sekolah</th>
        </tr>
        <tr>
            <td>2015 - 2018</td>
            <td>SMA Contoh</td>
        </tr>
        <tr>
            <td>2018 - 2022</td>
            <td>Universitas Contoh</td>
        </tr>
    </table>

    <br>

    <!-- BAGIAN FORM -->
    <h2>Form Kontak</h2>
    <form>
        <label>Nama:</label><br>
        <input type="text" name="nama"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Pesan:</label><br>
        <textarea name="pesan" rows="4" cols="30"></textarea><br><br>

        <label>Jenis Kelamin:</label><br>
        <input type="radio" name="jk" value="Laki-laki"> Laki-laki
        <input type="radio" name="jk" value="Perempuan"> Perempuan<br><br>

        <input type="submit" value="Kirim">
    </form>

</body>
</html>
